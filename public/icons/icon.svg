<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Riptag favicon: geometric "R" tag mark, brand green on near-black.
       Designed to stay crisp at 16px favicon size — sharp corners, no
       sub-pixel curves, no thin strokes. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e13"/>
      <stop offset="100%" stop-color="#11161d"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#g)"/>

  <!-- Subtle inner border for definition -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" ry="13.5"
        fill="none" stroke="rgba(0,229,160,0.18)" stroke-width="1"/>

  <!-- Geometric tag/chevron mark in brand green -->
  <!-- Top bar of the "R" -->
  <path d="M 16 16 L 38 16 L 44 22 L 44 30 L 38 36 L 24 36 L 24 28 L 36 28 L 36 24 L 16 24 Z"
        fill="#00e5a0"/>

  <!-- Diagonal leg of the "R" (right-tilting bar suggests a riptide wave) -->
  <path d="M 28 32 L 36 32 L 48 48 L 40 48 Z" fill="#00e5a0"/>

  <!-- Left stem of the "R" -->
  <rect x="16" y="24" width="8" height="24" fill="#00e5a0"/>

  <!-- Tiny accent dot — the "tag hole" -->
  <circle cx="50" cy="14" r="2.5" fill="#00e5a0" opacity="0.7"/>
</svg>
