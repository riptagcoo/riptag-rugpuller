<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Riptag favicon: a clean price-tag mark.
       - Tag body: brand green, pointed end on the left, rounded right corners.
       - Heavy black border so it reads at 16px favicon size.
       - Hole punch near the pointed end with a black rim. -->

  <!-- Tag body + thick black border drawn as one path so the stroke wraps the whole silhouette -->
  <path d="M 22 8 L 54 8 Q 60 8 60 14 L 60 50 Q 60 56 54 56 L 22 56 L 5 33 Q 4 32 5 31 Z"
        fill="#00e5a0"
        stroke="#000"
        stroke-width="5"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Hole punch -->
  <circle cx="18" cy="32" r="4" fill="#0a0e13" stroke="#000" stroke-width="2"/>

  <!-- Small "R" wordmark inside the tag for brand recognition -->
  <text x="40" y="42"
        font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
        font-weight="900"
        font-size="22"
        text-anchor="middle"
        fill="#0a0e13"
        letter-spacing="-1">R</text>
</svg>
